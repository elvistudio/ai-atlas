<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Atlas document</title>
    <meta name="description" content="Rendered AI Atlas Markdown and JSON documents." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="doc-page">
      <nav class="actions" aria-label="Viewer links">
        <a href="./">Back to viewer</a>
        <a href="doc.html?doc=taxonomy">Taxonomy</a>
        <a href="doc.html?doc=review">Review guide</a>
        <a href="doc.html?doc=json">JSON</a>
        <a href="https://github.com/ai-atlas-project/ai-atlas">GitHub repo</a>
      </nav>
      <article id="doc" class="doc-card">
        <p>Loading document…</p>
      </article>
    </main>

    <footer class="site-footer" aria-label="Site footer">
      <p>AI Atlas v0.1 public preview · Level 1-2 taxonomy viewer · Canonical source remains GitHub.</p>
      <nav class="footer-links" aria-label="Footer links">
        <a href="https://github.com/ai-atlas-project/ai-atlas">GitHub repository</a>
        <a href="https://www.linkedin.com/in/astzhalkouski/">Alyaksandr Stzhalkouski</a>
        <a href="doc.html?doc=review">Review guide</a>
        <a href="doc.html?doc=json">Formatted JSON</a>
        <a href="https://github.com/ai-atlas-project/ai-atlas/issues/new">Feedback</a>
      </nav>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const DOCS = {
        taxonomy: {
          title: "AI Atlas taxonomy",
          path: "../taxonomy/ai-taxonomy-l1-l2.md",
          type: "markdown",
        },
        review: {
          title: "AI Atlas public review guide",
          path: "../PUBLIC_REVIEW.md",
          type: "markdown",
        },
        release: {
          title: "AI Atlas v0.1 release notes",
          path: "../docs/releases/v0.1-public-preview.md",
          type: "markdown",
        },
        json: {
          title: "AI Atlas taxonomy JSON",
          path: "../taxonomy/ai-taxonomy-l1-l2.json",
          type: "json",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const docKey = params.get("doc") || "taxonomy";
      const doc = DOCS[docKey] || DOCS.taxonomy;
      const docEl = document.querySelector("#doc");

      document.title = doc.title;

      fetch(doc.path)
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Failed to load ${doc.path}: ${response.status}`);
          }
          return doc.type === "json" ? response.json() : response.text();
        })
        .then((content) => {
          if (doc.type === "json") {
            renderJson(content);
            return;
          }

          marked.setOptions({ gfm: true, breaks: false });
          docEl.innerHTML = marked.parse(content);
        })
        .catch((error) => {
          docEl.innerHTML = `
            <h1>Could not load document</h1>
            <p>${escapeHtml(error.message)}</p>
          `;
        });

      function renderJson(data) {
        const formatted = JSON.stringify(data, null, 2);
        docEl.classList.add("json-doc");
        docEl.innerHTML = `
          <header class="json-header">
            <div>
              <p class="eyebrow">Canonical source data</p>
              <h1>AI Atlas taxonomy JSON</h1>
              <p class="description">Formatted view of the Level 1-Level 2 public preview JSON.</p>
            </div>
            <a class="raw-link" href="../taxonomy/ai-taxonomy-l1-l2.json">Open raw JSON</a>
          </header>
          <pre class="json-viewer"><code>${escapeHtml(formatted)}</code></pre>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
